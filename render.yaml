services:
  - type: web
    name: deepfocus
    runtime: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn deepfocus.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20"
